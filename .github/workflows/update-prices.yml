name: Update Portfolio Prices

on:
  schedule:
    # Every 30 min during market hours (Mon-Fri, 13:00-21:00 UTC = ~8AM-4PM ET)
    - cron: '*/30 13-21 * * 1-5'
  workflow_dispatch: # Manual trigger anytime

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch prices and update data.json
        run: python update_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
